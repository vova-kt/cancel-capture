name: cancel-capture

x-runtime: &runtime
  build:
    context: .
  env_file:
    - path: .env
      required: false
  environment:
    DATA_DIR: /data
    SQLITE_PATH: /data/catalog.sqlite3
    TG_SESSION_PATH: /data/telegram/cancel_capture
  volumes:
    - cancel_capture_data:/data
  read_only: true
  tmpfs:
    - /tmp:size=256m,mode=1777
  security_opt:
    - no-new-privileges:true

services:
  bot:
    <<: *runtime
    command: ["cancel-capture", "bot"]
    restart: unless-stopped

  importer:
    <<: *runtime
    command: ["cancel-capture", "import-history"]
    profiles: ["tools"]
    stdin_open: true
    tty: true

  streamlit:
    <<: *runtime
    command:
      [
        "streamlit",
        "run",
        "src/cancel_capture/streamlitapp/app.py",
        "--server.address=0.0.0.0",
      ]
    profiles: ["dev"]
    ports:
      - "127.0.0.1:8501:8501"

volumes:
  cancel_capture_data:
